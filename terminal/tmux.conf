# =============================================================================
# .tmux.conf - Claude Code / 開発作業向け tmux 設定
# =============================================================================
# 配置場所: ~/.tmux.conf
# 設定反映: tmux source-file ~/.tmux.conf  または  prefix + r
# =============================================================================

# -----------------------------------------------------------------------------
# 基本設定
# -----------------------------------------------------------------------------

# キー入力の遅延をゼロに
set-option -s escape-time 0

# ターミナルの色を256色対応に
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# スクロールバッファを50000行に
set -g history-limit 50000

# ウィンドウ・ペインのインデックスを1始まりに
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたときに番号を詰める
set -g renumber-windows on

# ウィンドウのアクティビティ通知
setw -g monitor-activity on
set -g visual-activity off

# -----------------------------------------------------------------------------
# マウス設定
# -----------------------------------------------------------------------------

# ペインのクリック選択・リサイズは有効
# スクロールはiTerm2側を使うため tmux のホイールイベントを無効化
set -g mouse on
unbind -n WheelUpPane
unbind -n WheelDownPane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

# -----------------------------------------------------------------------------
# キーバインド
# -----------------------------------------------------------------------------

# 設定リロード: prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded."

# ペイン分割
bind | split-window -h -c "#{pane_current_path}"   # 左右分割
bind - split-window -v -c "#{pane_current_path}"   # 上下分割
bind + break-pane                                   # 分割解除
bind = select-layout even-horizontal               # 均等リサイズ

# 新しいウィンドウは現在のディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# Vimライクなペイン移動: prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのリサイズ: prefix + H/J/K/L（大文字）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# セッション一覧: prefix + s
bind s choose-session

# -----------------------------------------------------------------------------
# コピーモード（viキーバインド）
# -----------------------------------------------------------------------------
setw -g mode-keys vi

# コピーモード開始: prefix + Enter
bind Enter copy-mode

# コピーモード中のキーバインド
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi V      send -X select-line
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# y / Enter でコピー（macOS）
if -b 'command -v pbcopy > /dev/null 2>&1' \
    'bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy" \; display "Copied!"'
if -b 'command -v pbcopy > /dev/null 2>&1' \
    'bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy" \; display "Copied!"'

# マウスドラッグでコピー（macOS）
if -b 'command -v pbcopy > /dev/null 2>&1' \
    'bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"'

# -----------------------------------------------------------------------------
# ステータスバー
# -----------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5

set -g status-bg black
set -g status-fg white

# 左側: セッション名
set -g status-left-length 30
set -g status-left "#[fg=black,bg=cyan,bold] #S #[fg=cyan,bg=black]"

# 右側: セッション数・日時・ホスト名
set -g status-right-length 70
set -g status-right "#[fg=colour244]| #[fg=white]Sessions: #(tmux list-sessions 2>/dev/null | wc -l | tr -d ' ') #[fg=colour244]| #[fg=white]%Y-%m-%d #[fg=cyan,bold]%H:%M #[fg=black,bg=cyan] #h "

# ウィンドウリスト
set -g status-justify left
setw -g window-status-format " #I:#W "
setw -g window-status-style fg=colour244,bg=black
setw -g window-status-current-format "#[fg=black,bg=red,bold] #I:#W "
setw -g window-status-activity-style fg=yellow,bg=black,bold

# ペインの境界線
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=white

# メッセージ
set -g message-style fg=black,bg=yellow,bold

# =============================================================================