# .pre-commit-config.yaml
#
# 機密情報流出を防ぐ pre-commit フック設定
# セットアップ: pip install pre-commit && pre-commit install
# 手動実行:    pre-commit run --all-files
#
# ドキュメント: https://pre-commit.com/

# -----------------------------------------------
# グローバル除外パターン
# node_modules / vendor / .git 等は全フックで無視
# -----------------------------------------------
exclude: |
  (?x)^(
    node_modules/.*|
    vendor/.*|
    \.git/.*|
    \.yarn/.*|
    dist/.*|
    build/.*|
    \.next/.*|
    __pycache__/.*|
    .*\.min\.js|
    .*\.min\.css|
    go\.sum|
    package-lock\.json|
    yarn\.lock|
    Gemfile\.lock|
    Cargo\.lock|
    poetry\.lock
  )$

repos:

  # ============================================================
  # [1] gitleaks — シークレット検知（最重要）
  #     AWS/GCP/Azure トークン、SSH 鍵、汎用 API キーなどを検知
  #     カスタムルールは .gitleaks.toml に記述
  # ============================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "gitleaks: シークレット検知"
        # プロジェクト固有ルール・除外設定は .gitleaks.toml で管理
        args: ["--config=.gitleaks.toml"]

  # ============================================================
  # [2] ローカル絶対パスの検知
  #     /Users/<name>/ や C:\Users\ がコードに含まれると
  #     環境依存・個人情報流出の原因になる
  # ============================================================
  - repo: local
    hooks:
      - id: detect-local-absolute-paths
        name: "ローカル絶対パス検知 (/Users/, /home/, C:\\Users\\)"
        language: pygrep
        # macOS: /Users/username/  Linux: /home/username/  Windows: C:\Users\
        entry: >
          (?x)(
            /Users/[A-Za-z0-9_.-]+/(?!\.)|
            /home/[A-Za-z0-9_.-]+/(?!\.)|
            [A-Za-z]:\\Users\\[A-Za-z0-9_. -]+\\|
            [A-Za-z]:\\home\\[A-Za-z0-9_. -]+\\
          )
        # テキストファイルのみ対象（バイナリ除外）
        types: [text]
        exclude: |
          (?x)^(
            .*\.md|
            .*\.txt|
            docs/.*|
            CLAUDE\.md|
            AI_CONTEXT\.md|
            README.*|
            .*\.example|
            .*\.sample|
            terminal/p10k\.zsh|
            \.gitleaks\.toml|
            \.pre-commit-config\.yaml
          )$

  # ============================================================
  # [3] .env ファイルの誤コミット防止
  #     .env, .env.local, .env.production 等を検知
  #     .env.example / .env.sample は許可
  # ============================================================
  - repo: local
    hooks:
      - id: detect-dotenv-files
        name: ".env ファイルの誤コミット検知"
        language: fail
        # .env.example や .env.sample は許可
        entry: ".env ファイルは絶対にコミットしないでください。.env.example を使用してください。"
        files: |
          (?x)^(
            \.env$|
            \.env\.[^.]+$|
            .*/\.env$|
            .*/\.env\.[^.]+$
          )$
        exclude: |
          (?x)(
            \.env\.example$|
            \.env\.sample$|
            \.env\.template$|
            \.env\.test$
          )$

  # ============================================================
  # [4] pre-commit 標準フック — 基本的なファイル品質チェック
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # ファイル末尾の空白を除去
      - id: trailing-whitespace
        name: "末尾の空白を除去"

      # ファイル末尾に改行を追加
      - id: end-of-file-fixer
        name: "ファイル末尾に改行を追加"

      # YAML 構文チェック
      - id: check-yaml
        name: "YAML 構文チェック"

      # JSON 構文チェック
      - id: check-json
        name: "JSON 構文チェック"

      # 大きなファイルのコミットを防止（デフォルト: 500KB）
      - id: check-added-large-files
        name: "大きなファイルの検知 (>500KB)"
        args: ["--maxkb=500"]

      # シークレットが含まれやすいファイル名を検知
      - id: detect-private-key
        name: "SSH 秘密鍵ファイルの検知"

      # マージコンフリクトマーカーを検知
      - id: check-merge-conflict
        name: "マージコンフリクトマーカーの検知"

      # 実行可能なシェルスクリプトの shebang チェック
      - id: check-executables-have-shebangs
        name: "シェバン行チェック"

      # case-insensitive なファイルシステムでの衝突防止
      - id: check-case-conflict
        name: "ファイル名の大文字小文字衝突チェック"

  # ============================================================
  # [5] ShellCheck — シェルスクリプト静的解析
  #     CLAUDE.md の必須ルールに準拠
  # ============================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: "ShellCheck: シェルスクリプト静的解析"
        types: [shell]
        # severity: warning 以上を失敗とする
        args: ["--severity=warning"]
        # p10k.zsh は zsh 固有構文（anonymous function 等）を含むため除外
        exclude: |
          (?x)^(
            terminal/p10k\.zsh|
            .*\.zsh$
          )$
